services:
  server:
    build: .
    image: opspilot-local
    # macOS 기준 root 실행(named volume /data 쓰기 + Docker Desktop bind 매핑).
    # Linux 에선 호스트 bind 마운트에 root-owned 파일이 생기므로 아래를 켜고
    # named volume 권한을 정합시키세요(.env 에 HOST_UID/HOST_GID 추가):
    #   user: "${HOST_UID}:${HOST_GID}"
    ports:
      - "3001:3001"
    environment:
      PORT: "3001"
      OPS_DB_PATH: /data/opspilot.sqlite
      # 세션 스캐너(usage/work-metric)가 읽을 Claude transcript 경로. 컨테이너 내 마운트 지점.
      OPS_CLAUDE_PROJECTS_DIR: /host-claude-projects
      # 자동 ingest: 등록 프로젝트 clone 의 신규 커밋을 "작업" 대기열에 적재(git diff 만, 토큰 0).
      # 평가(LLM)까지 자동화는 별도 autoEval setting 이 가드 — 기본 off 라 여기선 대기까지만 쌓인다.
      OPS_AUTO_INGEST: "1"
    volumes:
      - opspilot-data:/data
      - ${CONNECTLY_PATH}:/srv/connectly
      # 호스트 ~/.claude/projects 를 읽기전용 마운트 — 작업/활동/Toolkit 세션 집계 소스.
      - ${CLAUDE_PROJECTS_PATH}:/host-claude-projects:ro
    restart: unless-stopped

  web:
    image: opspilot-local
    entrypoint: ["corepack", "pnpm", "--filter", "@opspilot/web", "preview", "--host", "0.0.0.0", "--port", "5173"]
    ports:
      # 호스트 포트는 OPS_WEB_PORT 로 조정(기본 5174 — Vite 기본 5173 과 충돌 회피, 백오피스 등). 컨테이너 내부는 5173 고정.
      - "${OPS_WEB_PORT:-5174}:5173"
    environment:
      OPS_API_TARGET: http://server:3001
    depends_on:
      - server
    restart: unless-stopped

volumes:
  opspilot-data:
